<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aksesuar Dolandyryş</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="main-container">
        <header>
            <h1><i class="fas fa-mobile-alt"></i> Premium Dükan</h1>
            <div class="stats-panel">
                <span>Haryt: <b id="totalCount">0</b></span>
                <span>Jemi: <b id="totalValue">0</b> TMT</span>
            </div>
        </header>

        <section class="input-card">
            <input type="text" id="prodName" placeholder="Haryt ady (mysal: iPhone 15)">
            <div class="row">
                <input type="number" id="prodPrice" placeholder="Bahasy">
                <select id="prodCategory">
                    <option value="Telefon Daş">Telefon Daş</option>
                    <option value="Zarýatnik">Zarýatnik</option>
                    <option value="Gorag Aýnasy">Gorag Aýnasy</option>
                    <option value="Nauşnik">Nauşnik</option>
                    <option value="Beýlekiler">Beýlekiler</option>
                </select>
            </div>
            <div class="row">
                <label for="prodImg" class="upload-btn"><i class="fas fa-image"></i> Surat Saýla</label>
                <input type="file" id="prodImg" accept="image/*" style="display:none">
                <button id="addBtn">Goşmak</button>
            </div>
        </section>

        <div id="inventoryList" class="product-grid">
            </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
