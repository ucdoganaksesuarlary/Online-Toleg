<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Aksesuar Dükan</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { box-sizing: border-box; transition: 0.3s; }
        
        body {
            background-color: #0d1117 !important;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        header { position: relative; text-align: center; margin-bottom: 20px; }
        header h1 { color: #a371f7; font-size: 26px; margin: 0; }
        
        .refresh-btn {
            position: absolute; right: 0; top: 5px;
            background: none; border: none; color: #8b949e; cursor: pointer; font-size: 20px;
        }

        .stats-card {
            background: #161b22;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-around;
            border: 1px solid #30363d;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .input-form {
            background: #161b22;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #30363d;
            margin-bottom: 25px;
        }

        input, select, .file-btn {
            background: #010409;
            border: 1px solid #30363d;
            color: white;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            margin-bottom: 12px;
            outline: none;
        }

        .row { display: flex; gap: 10px; }

        #addBtn {
            background: #238636;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
        }

        .file-btn { background: #21262d; text-align: center; cursor: pointer; display: block; }

        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: #161b22;
            border-radius: 12px;
            border: 1px solid #30363d;
            overflow: hidden;
            position: relative;
        }

        .card img { width: 100%; height: 140px; object-fit: cover; background: #0d1117; }

        .card-body { padding: 10px; text-align: center; }
        .card-body h3 { font-size: 14px; margin: 5px 0; color: #f0f6fc; }
        .price { color: #3fb950; font-weight: bold; font-size: 14px; }
        .qty-tag { font-size: 11px; color: #8b949e; }

        .del-btn {
            position: absolute; top: 5px; right: 5px;
            background: rgba(248, 81, 73, 0.9);
            color: white; border: none; border-radius: 50%;
            width: 25px; height: 25px; cursor: pointer; z-index: 5;
        }

        #customAlert {
            display: none; position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%); background: #f85149;
            color: white; padding: 15px 30px; border-radius: 10px;
            z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="customAlert">Maglumat doldur!</div>

    <div class="container">
        <header>
            <h1><i class="fas fa-gem"></i> Premium Dükan</h1>
            <button class="refresh-btn" onclick="location.reload()"><i class="fas fa-sync-alt"></i></button>
        </header>

        <div class="stats-card">
            <span>Haryt: <span id="count">0</span></span>
            <span>Jemi: <span id="total">0.00</span> TL</span>
        </div>

        <div class="input-form">
            <input type="text" id="pName" placeholder="Harydyň ady...">
            <div class="row">
                <input type="number" id="pPrice" placeholder="Bahasy (TL)">
                <input type="number" id="pQty" placeholder="Sany" value="1">
            </div>
            <select id="pCat">
                <option value="Telefon Daş">Telefon Daş</option>
                <option value="Zarýatnik">Zarýatnik</option>
                <option value="Gorag Aýnasy">Gorag Aýnasy</option>
                <option value="Nauşnik">Nauşnik</option>
                <option value="Kalonka">Kalonka</option>
                <option value="Sagat">Sagat</option>
            </select>
            <label for="pImg" class="file-btn"><i class="fas fa-camera"></i> Surat Saýla</label>
            <input type="file" id="pImg" accept="image/*" style="display:none">
            <button id="addBtn">Haryt Goş</button>
        </div>

        <div id="list" class="product-grid"></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('aksesuar_db_tl')) || [];

        function showAlert() {
            const alertBox = document.getElementById('customAlert');
            alertBox.style.display = 'block';
            setTimeout(() => { alertBox.style.display = 'none'; }, 2500);
        }

        function showItems() {
            const list = document.getElementById('list');
            list.innerHTML = '';
            let totalSum = 0;
            let totalCount = 0;

            db.forEach((item, i) => {
                let itemPrice = parseFloat(item.price) || 0;
                let itemQty = parseInt(item.qty) || 1;
                let itemTotal = itemPrice * itemQty;
                
                totalSum += itemTotal;
                totalCount += itemQty;

                list.innerHTML += `
                    <div class="card">
                        <button class="del-btn" onclick="remove(${i})">&times;</button>
                        <img src="${item.img || 'https://via.placeholder.com/150/0d1117/ffffff?text=Surat+Yok'}">
                        <div class="card-body">
                            <small style="color: #8b949e">${item.cat}</small>
                            <h3>${item.name}</h3>
                            <div class="qty-tag">${itemQty} sany x ${itemPrice} TL</div>
                            <div class="price">${itemTotal.toFixed(2)} TL</div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('count').innerText = totalCount;
            document.getElementById('total').innerText = totalSum.toFixed(2);
            localStorage.setItem('aksesuar_db_tl', JSON.stringify(db));
        }

        document.getElementById('addBtn').onclick = function() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const qty = document.getElementById('pQty').value || 1;
            const cat = document.getElementById('pCat').value;
            const imgInput = document.getElementById('pImg');
            
            if (!name || !price) {
                showAlert();
                return;
            }

            if (imgInput.files && imgInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const newItem = {
                        name: name,
                        price: price,
                        qty: qty,
                        cat: cat,
                        img: e.target.result
                    };
                    db.push(newItem);
                    saveData();
                };
                reader.readAsDataURL(imgInput.files[0]);
            } else {
                const newItem = {
                    name: name,
                    price: price,
                    qty: qty,
                    cat: cat,
                    img: null
                };
                db.push(newItem);
                saveData();
            }
        };

        function saveData() {
            localStorage.setItem('aksesuar_db_tl', JSON.stringify(db));
            showItems();
            // Inputlary arassalamak
            document.getElementById('pName').value = '';
            document.getElementById('pPrice').value = '';
            document.getElementById('pQty').value = '1';
            document.getElementById('pImg').value = '';
        }

        function remove(i) {
            if(confirm("Öçürmelimi?")) {
                db.splice(i, 1);
                saveData();
            }
        }

        window.onload = showItems;
    </script>
</body>
</html>
