<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Accessory Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="glass-container">
        <header>
            <h1><i class="fas fa-microchip"></i> Aksesuar Dolandyryş</h1>
            <div class="stats">
                <span>Jemi haryt: <b id="totalCount">0</b></span>
                <span>Jemi baha: <b id="totalValue">0</b> TMT</span>
            </div>
        </header>

        <section class="input-card">
            <div class="input-group">
                <input type="text" id="prodName" placeholder="Haryt ady (mysal: iPhone 15 Case)">
                <input type="number" id="prodPrice" placeholder="Bahasy">
                <select id="prodCategory">
                    <option value="Beýlekiler">Kategoriýa</option>
                    <option value="Gabyk">Gabyk (Case)</option>
                    <option value="Aýna">Gorag Aýnasy</option>
                    <option value="Zarýad">Zarýad beriji</option>
                    <option value="Nauşnik">Nauşnik</option>
                </select>
                <button id="addBtn"><i class="fas fa-plus"></i></button>
            </div>
        </section>

        <section class="list-container">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Harytlardan gözle...">
            </div>
            <div id="inventoryList" class="grid-list">
                <!-- JavaScript arkaly doldurylar -->
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
