<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AltynPay X | Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #0b0f1a; color: white; }
        .font-modern { font-family: 'Orbitron', sans-serif; }
        
        .credit-card {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.3);
            border-radius: 24px;
        }

        .copy-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.2s;
            cursor: pointer;
        }
        .copy-card:active { transform: scale(0.97); background: rgba(16, 185, 129, 0.1); }

        .menu-item {
            background: #161b2a;
            border: 1px solid #242b3d;
        }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">

    <div class="max-w-md w-full py-6">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold font-modern tracking-tighter">AltynPay <span class="text-emerald-400">X</span></h1>
        </div>

        <div class="credit-card h-52 w-full p-7 mb-6 flex flex-col justify-between relative overflow-hidden">
            <div class="flex justify-between items-start z-10 text-white/90">
                <span class="font-modern font-bold text-lg tracking-widest italic">ALTYN ASYR</span>
                <div class="w-11 h-8 bg-yellow-400/80 rounded shadow-inner"></div>
            </div>
            
            <div class="z-10 text-center">
                <p class="text-2xl tracking-[0.2em] font-bold">9500 00** **** 0000</p>
            </div>

            <div class="flex justify-between items-end z-10 text-[10px] font-mono opacity-80">
                <p>BERDIMYRAT KERIMOW</p>
                <p>12/28</p>
            </div>
            <div class="absolute -right-10 -bottom-10 w-40 h-40 bg-white/10 rounded-full"></div>
        </div>

        <div class="space-y-3 mb-8">
            <div onclick="copyText('Berdimyrat Kerimow', 'At nusgalandy!')" class="copy-card p-4 rounded-2xl flex justify-between items-center">
                <div>
                    <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest">Ady we Familiýasy</p>
                    <p class="text-lg font-bold">Berdimyrat Kerimow</p>
                </div>
                <span class="text-slate-500">📋</span>
            </div>

            <div onclick="copyText('TR17 0001 0090 1106 1212 2050 01', 'IBAN nusgalandy!')" class="copy-card p-4 rounded-2xl flex justify-between items-center">
                <div>
                    <p class="text-[10px] text-emerald-400 font-bold uppercase tracking-widest">Ziraat Bankası IBAN</p>
                    <p class="text-sm font-mono text-slate-200">TR17 0001 0090 1106 1212 2050 01</p>
                </div>
                <span class="text-slate-500">📋</span>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="menu-item p-5 rounded-2xl flex flex-col items-center">
                <div class="text-xl mb-1">📡</div>
                <p class="text-xs font-bold">Wi-Fi</p>
            </div>
            <div class="menu-item p-5 rounded-2xl flex flex-col items-center">
                <div class="text-xl mb-1">📺</div>
                <p class="text-xs font-bold">Älem TV</p>
            </div>
            <div class="menu-item p-5 rounded-2xl flex flex-col items-center">
                <div class="text-xl mb-1">🎬</div>
                <p class="text-xs font-bold">Belet Film</p>
            </div>
            <div class="menu-item p-5 rounded-2xl flex flex-col items-center">
                <div class="text-xl mb-1">📞</div>
                <p class="text-xs font-bold">Öý telefony</p>
            </div>
        </div>

        <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-emerald-500 text-black px-6 py-2 rounded-full font-bold opacity-0 transition-all duration-300 pointer-events-none text-sm">
            Nusgalandy!
        </div>
    </div>

    <script>
        function copyText(text, message) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.innerText = message;
                toast.style.opacity = '1';
                toast.style.bottom = '40px';
                setTimeout(() => { 
                    toast.style.opacity = '0'; 
                    toast.style.bottom = '30px';
                }, 2000);
            });
        }
    </script>
</body>
</html>
