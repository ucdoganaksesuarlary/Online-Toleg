<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AltynPay X | Professional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Playfair+Display:ital,wght@1,700&family=JetBrains+Mono:wght@700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #f8fafc; color: #1e293b; }
        .font-modern { font-family: 'Orbitron', sans-serif; }
        .font-fancy { font-family: 'Playfair Display', serif; }
        .font-code { font-family: 'JetBrains Mono', monospace; }
        
        .premium-card {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            border-radius: 35px;
            box-shadow: 0 25px 50px -12px rgba(59, 130, 246, 0.3);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }

        /* Täze Professional Menýu Stili */
        .menu-grid-item {
            background: #ffffff;
            border-radius: 24px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.04);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .menu-grid-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: #3b82f6;
        }

        .icon-box {
            background: #f1f5f9;
            width: 50px;
            height: 50px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
            color: #3b82f6;
            transition: background 0.3s;
        }

        .menu-grid-item:hover .icon-box {
            background: #eff6ff;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-5">

    <div class="max-w-md w-full py-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold font-modern tracking-[0.2em] italic text-blue-700">ALTYN ASYR</h1>
            <p class="text-slate-400 text-[10px] tracking-[4px] uppercase mt-2">Döwrebap Sanly Çözgüt</p>
        </div>

        <div class="premium-card w-full p-8 mb-10 flex flex-col justify-center relative overflow-hidden min-h-[300px]">
            <div onclick="copyText('Berdimyrat Kerimow', 'At nusgalandy!')" class="glass-input p-5 z-10 mb-4 rounded-2xl text-white">
                <p class="text-[10px] uppercase font-bold tracking-wider opacity-80 mb-1 text-blue-100">Karta Eýesi</p>
                <p class="text-2xl font-fancy italic tracking-wide">Berdimyrat Kerimow</p>
            </div>

            <div onclick="copyText('TR17 0001 0090 1106 1212 2050 01', 'IBAN nusgalandy!')" class="glass-input p-5 z-10 rounded-2xl text-white">
                <p class="text-[10px] uppercase font-bold tracking-wider opacity-80 mb-1 text-blue-100">Ziraat Bankası IBAN</p>
                <p class="text-[15px] font-code leading-relaxed">TR17 0001 0090 1106 1212 2050 01</p>
            </div>
            
            <div class="absolute -right-10 -bottom-10 w-48 h-48 bg-white/10 rounded-full blur-3xl"></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="menu-grid-item p-5 flex flex-col items-center cursor-pointer">
                <div class="icon-box">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
                </div>
                <p class="text-[11px] font-bold uppercase tracking-widest text-slate-600">WI-FI</p>
            </div>

            <div class="menu-grid-item p-5 flex flex-col items-center cursor-pointer">
                <div class="icon-box">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
                </div>
                <p class="text-[11px] font-bold uppercase tracking-widest text-slate-600 text-center">Älem TV</p>
            </div>

            <div class="menu-grid-item p-5 flex flex-col items-center cursor-pointer">
                <div class="icon-box">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><path d="M7 3v18"/><path d="M17 3v18"/><path d="M3 7h4"/><path d="M3 12h18"/><path d="M3 17h4"/><path d="M17 12h4"/><path d="M17 17h4"/><path d="M17 7h4"/></svg>
                </div>
                <p class="text-[11px] font-bold uppercase tracking-widest text-slate-600">Belet Film</p>
            </div>

            <div class="menu-grid-item p-5 flex flex-col items-center cursor-pointer">
                <div class="icon-box">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                </div>
                <p class="text-[11px] font-bold uppercase tracking-widest text-slate-600 text-center">Öý Telefony</p>
            </div>
        </div>

        <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-8 py-3 rounded-2xl font-bold opacity-0 transition-all duration-300 pointer-events-none shadow-2xl z-50 text-sm">
            Nusgalandy!
        </div>
    </div>

    <script>
        function copyText(text, msg) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.innerText = msg;
                toast.style.opacity = '1';
                toast.style.transform = 'translate(-50%, 20px)';
                setTimeout(() => { 
                    toast.style.opacity = '0'; 
                    toast.style.transform = 'translate(-50%, 0px)';
                }, 2000);
            });
        }
    </script>
</body>
</html>
