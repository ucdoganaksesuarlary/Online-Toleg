<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AltynPay X | Minimalist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #0b101b; color: white; margin: 0; padding: 0; }
        .font-modern { font-family: 'Orbitron', sans-serif; }
        
        .premium-card {
            background: linear-gradient(135deg, #2d6a4f 0%, #40916c 25%, #800f2f 75%, #a4133c 100%);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border-radius: 35px;
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s;
            cursor: pointer;
        }
        .glass-input:active { transform: scale(0.98); background: rgba(255, 255, 255, 0.2); }

        .menu-grid-item {
            background: #161b2a;
            border: 1px solid #243147;
            border-radius: 24px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-5">

    <div class="max-w-md w-full py-4">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold font-modern tracking-[0.2em] italic text-white">ALTYN ASYR</h1>
            <p class="text-slate-500 text-[10px] tracking-[4px] uppercase mt-2">Türkmen • Türk</p>
        </div>

        <div class="premium-card w-full p-8 mb-10 flex flex-col justify-center relative overflow-hidden min-h-[300px]">
            
            <div onclick="copyText('Berdimyrat Kerimow', 'At nusgalandy!')" class="glass-input p-5 z-10 mb-4 rounded-2xl">
                <p class="text-[10px] uppercase font-bold tracking-wider opacity-60 mb-1">Karta Eýesi</p>
                <p class="text-2xl font-bold tracking-wide">Berdimyrat Kerimow</p>
            </div>

            <div onclick="copyText('TR17 0001 0090 1106 1212 2050 01', 'IBAN nusgalandy!')" class="glass-input p-5 z-10 rounded-2xl">
                <p class="text-[10px] uppercase font-bold tracking-wider opacity-60 mb-1">Ziraat Bankası IBAN</p>
                <p class="text-[15px] font-mono font-bold leading-relaxed">TR17 0001 0090 1106 1212 2050 01</p>
            </div>

            <div class="absolute -right-10 -bottom-10 w-48 h-48 bg-white/5 rounded-full blur-3xl"></div>
            <div class="absolute -left-10 -top-10 w-32 h-32 bg-black/10 rounded-full blur-2xl"></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="menu-grid-item p-6 flex flex-col items-center">
                <span class="text-3xl mb-2">📡</span>
                <p class="text-xs font-bold uppercase tracking-widest text-slate-400">Wi-Fi</p>
            </div>
            <div class="menu-grid-item p-6 flex flex-col items-center">
                <span class="text-3xl mb-2">📺</span>
                <p class="text-xs font-bold uppercase tracking-widest text-slate-400">Älem TV</p>
            </div>
            <div class="menu-grid-item p-6 flex flex-col items-center">
                <span class="text-3xl mb-2">🎬</span>
                <p class="text-xs font-bold uppercase tracking-widest text-slate-400">Belet Film</p>
            </div>
            <div class="menu-grid-item p-6 flex flex-col items-center">
                <span class="text-3xl mb-2">📞</span>
                <p class="text-xs font-bold uppercase tracking-widest text-slate-400">Öý telefony</p>
            </div>
        </div>

        <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 bg-emerald-500 text-black px-8 py-3 rounded-2xl font-bold opacity-0 transition-all duration-300 pointer-events-none shadow-2xl z-50">
            Nusgalandy!
        </div>
    </div>

    <script>
        function copyText(text, msg) {
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.innerText = msg;
                toast.style.opacity = '1';
                toast.style.transform = 'translate(-50%, 20px)';
                setTimeout(() => { 
                    toast.style.opacity = '0'; 
                    toast.style.transform = 'translate(-50%, 0px)';
                }, 2000);
            });
        }
    </script>
</body>
</html>
