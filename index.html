<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Accessory Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="glass-container">
        <header>
            <h1><i class="fas fa-gem"></i> Premium Aksesuar</h1>
            <div class="stats">
                <span>Jemi: <b id="totalCount">0</b></span> | 
                <span>Baha: <b id="totalValue">0</b> TMT</span>
            </div>
        </header>

        <section class="input-card">
            <div class="input-row">
                <input type="text" id="prodName" placeholder="Haryt ady...">
                <input type="number" id="prodPrice" placeholder="Baha">
            </div>
            <div class="input-row">
                <select id="prodCategory">
                    <option value="Beýlekiler">Kategoriýa</option>
                    <option value="Gabyk">Gabyk (Case)</option>
                    <option value="Aýna">Gorag Aýnasy</option>
                    <option value="Zarýad">Zarýad</option>
                    <option value="Nauşnik">Nauşnik</option>
                </select>
                <label for="prodImg" class="file-label"><i class="fas fa-camera"></i> Surat</label>
                <input type="file" id="prodImg" accept="image/*" style="display:none">
                <button id="addBtn">Goşmak</button>
            </div>
        </section>

        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Haryt gözle...">
        </div>

        <div id="inventoryList" class="grid-list">
            </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
